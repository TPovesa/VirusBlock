name: Linux Build

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/linux-build.yml'
      - 'desktop-app/**'
      - 'desktop-core/**'
      - 'shell/**'
      - 'gradle/**'
      - 'gradlew'
      - 'gradlew.bat'
      - 'settings.gradle.kts'
      - 'build.gradle.kts'
      - 'branding/**'
  workflow_dispatch:

concurrency:
  group: linux-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux GUI And NV
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Linux desktop dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          packages=(
            dpkg-dev
            fakeroot
            libgtk-3-0
            libx11-6
            libxext6
            libxrender1
            libxtst6
            libxi6
            libxrandr2
            libxinerama1
            libxcursor1
            libxcomposite1
            libxdamage1
            libxfixes3
            libgbm1
            libnss3
            libxkbcommon0
            rpm
          )
          if apt-cache show libasound2t64 >/dev/null 2>&1; then
            packages+=(libasound2t64)
          elif apt-cache show libasound2 >/dev/null 2>&1; then
            packages+=(libasound2)
          fi
          sudo apt-get install -y "${packages[@]}"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Build Linux desktop GUI bundle
        shell: bash
        run: |
          set -euo pipefail
          ./gradlew :desktop-app:packageReleaseUberJarForCurrentOS --stacktrace --no-daemon --console=plain 2>&1 | tee linux-gui-build.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            echo "::group::linux-gui-build tail"
            tail -n 200 linux-gui-build.log || true
            echo "::endgroup::"
            exit "$status"
          fi

      - name: Inspect Linux compose output
        shell: bash
        run: |
          set -euo pipefail
          root="desktop-app/build"
          if [ -d "$root" ]; then
            find "$root" -maxdepth 5 -print | sort
          else
            echo "Compose output root missing: $root"
          fi

      - name: Package Linux GUI archive
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/linux/gui/bin dist/linux/gui/lib
          GUI_JAR="$(find desktop-app/build -type f -path '*/compose/jars/*.jar' | head -n 1)"
          test -n "$GUI_JAR"
          cp "$GUI_JAR" dist/linux/gui/lib/neuralv-desktop.jar
          cat > dist/linux/gui/bin/neuralv <<'SH'
          #!/bin/sh
          set -eu
          SCRIPT_DIR="$(CDPATH= cd -- "$(dirname -- "$0")" && pwd)"
          APP_HOME="$(CDPATH= cd -- "$SCRIPT_DIR/.." && pwd)"
          exec java -jar "$APP_HOME/lib/neuralv-desktop.jar" "$@"
          SH
          chmod +x dist/linux/gui/bin/neuralv
          tar -C dist/linux/gui -czf dist/linux/neuralv-linux.tar.gz .

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build nv and shell binaries
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/shell
          cd shell
          go mod download
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags='-s -w' -o ../dist/shell/nv ./cmd/nv
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags='-s -w' -o ../dist/shell/neuralv-shell ./cmd/neuralv-shell
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags='-s -w' -o ../dist/shell/neuralvd ./cmd/neuralvd
          cd ..
          tar -C dist/shell -czf dist/shell/nv-linux.tar.gz nv
          tar -C dist/shell -czf dist/shell/neuralv-shell-linux.tar.gz neuralv-shell
          tar -C dist/shell -czf dist/shell/neuralvd-linux.tar.gz neuralvd

      - name: Upload Linux GUI log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linux-gui-gradle-log
          path: linux-gui-build.log
          if-no-files-found: warn

      - name: Upload Linux payloads
        uses: actions/upload-artifact@v4
        with:
          name: neuralv-linux-payloads
          path: |
            dist/linux/neuralv-linux.tar.gz
            dist/shell/nv-linux.tar.gz
            dist/shell/neuralv-shell-linux.tar.gz
            dist/shell/neuralvd-linux.tar.gz
          if-no-files-found: error

  publish-linux:
    name: Publish Linux Branch
    needs:
      - build-linux
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Linux payloads
        uses: actions/download-artifact@v4
        with:
          name: neuralv-linux-payloads
          path: stage/linux

      - name: Prepare linux-builds payload
        shell: bash
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
        run: |
          set -euo pipefail
          rm -rf publish-linux
          mkdir -p publish-linux/linux publish-linux/shell publish-linux/install
          cp stage/linux/neuralv-linux.tar.gz publish-linux/linux/
          cp stage/linux/nv-linux.tar.gz publish-linux/shell/
          cp stage/linux/neuralv-shell-linux.tar.gz publish-linux/shell/
          cp stage/linux/neuralvd-linux.tar.gz publish-linux/shell/
          cp shell/install/linux.sh publish-linux/install/linux.sh
          cp shell/install/nv.sh publish-linux/install/nv.sh
          sha_linux="$(sha256sum publish-linux/linux/neuralv-linux.tar.gz | awk '{print $1}')"
          sha_nv="$(sha256sum publish-linux/shell/nv-linux.tar.gz | awk '{print $1}')"
          sha_shell="$(sha256sum publish-linux/shell/neuralv-shell-linux.tar.gz | awk '{print $1}')"
          sha_daemon="$(sha256sum publish-linux/shell/neuralvd-linux.tar.gz | awk '{print $1}')"
          raw_base="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/linux-builds"
          export SHA_LINUX="$sha_linux"
          export SHA_NV="$sha_nv"
          export SHA_SHELL="$sha_shell"
          export SHA_DAEMON="$sha_daemon"
          export RAW_BASE="$raw_base"
          python3 - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          generated_at = datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
          manifest = {
              "success": True,
              "generated_at": generated_at,
              "release_channel": "main",
              "artifacts": [
                  {
                      "platform": "linux",
                      "channel": "main",
                      "version": os.environ["GITHUB_SHA"],
                      "sha256": os.environ["SHA_LINUX"],
                      "download_url": f"{os.environ['RAW_BASE']}/linux/neuralv-linux.tar.gz",
                      "install_command": "",
                      "file_name": "neuralv-linux.tar.gz",
                      "notes": ["Compose Desktop Linux GUI"],
                      "metadata": {
                          "daemonUrl": f"{os.environ['RAW_BASE']}/shell/neuralvd-linux.tar.gz",
                          "daemonSha256": os.environ["SHA_DAEMON"]
                      }
                  },
                  {
                      "platform": "nv",
                      "channel": "main",
                      "version": os.environ["GITHUB_SHA"],
                      "sha256": os.environ["SHA_NV"],
                      "download_url": f"{os.environ['RAW_BASE']}/shell/nv-linux.tar.gz",
                      "install_command": "curl -fsSL https://sosiskibot.ru/neuralv/install/nv.sh | sh",
                      "file_name": "nv-linux.tar.gz",
                      "notes": ["Linux package manager for NeuralV releases"],
                      "metadata": {}
                  },
                  {
                      "platform": "shell",
                      "channel": "main",
                      "version": os.environ["GITHUB_SHA"],
                      "sha256": os.environ["SHA_SHELL"],
                      "download_url": f"{os.environ['RAW_BASE']}/shell/neuralv-shell-linux.tar.gz",
                      "install_command": "curl -fsSL https://sosiskibot.ru/neuralv/install/nv.sh | sh && nv install neuralv@latest",
                      "file_name": "neuralv-shell-linux.tar.gz",
                      "notes": ["Bubble Tea shell client"],
                      "metadata": {
                          "daemonUrl": f"{os.environ['RAW_BASE']}/shell/neuralvd-linux.tar.gz",
                          "daemonSha256": os.environ["SHA_DAEMON"]
                      }
                  }
              ]
          }
          with open("publish-linux/manifest.json", "w", encoding="utf-8") as f:
              json.dump(manifest, f, ensure_ascii=False, indent=2)
          with open("publish-linux/BUILD_INFO.txt", "w", encoding="utf-8") as f:
              f.write(
                  f"Repository: {os.environ['GITHUB_REPOSITORY']}\n"
                  f"Commit: {os.environ['GITHUB_SHA']}\n"
                  f"Workflow Run: {os.environ['GITHUB_SERVER_URL']}/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}\n"
                  f"Built At: {generated_at}\n"
              )
          PY

      - name: Publish linux-builds branch
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          rm -rf /tmp/linux-builds
          mkdir -p /tmp/linux-builds
          cp -R publish-linux/. /tmp/linux-builds/
          cd /tmp/linux-builds
          git init
          git checkout -b linux-builds
          git add .
          git -c user.name="github-actions[bot]" -c user.email="41898282+github-actions[bot]@users.noreply.github.com" commit -m "Publish Linux payloads for ${GITHUB_SHA} [skip ci]"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin linux-builds

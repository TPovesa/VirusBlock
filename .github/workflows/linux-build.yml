name: Linux GUI Build

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/linux-build.yml'
      - 'desktop-app/**'
      - 'desktop-core/**'
      - 'gradle/**'
      - 'gradle.properties'
      - 'gradlew'
      - 'settings-desktop.gradle.kts'
      - 'build.gradle.kts'
      - 'branding/**'
  workflow_dispatch:

concurrency:
  group: linux-gui-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-linux-gui:
    name: Build Linux GUI
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Build Linux desktop GUI portable jar
        shell: bash
        run: |
          set -euo pipefail
          ./gradlew --settings-file settings-desktop.gradle.kts :desktop-app:portableDesktopJar --stacktrace --no-daemon --console=plain 2>&1 | tee linux-gui-build.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            echo "::group::linux-gui-build tail"
            tail -n 200 linux-gui-build.log || true
            echo "::endgroup::"
            exit "$status"
          fi

      - name: Package Linux GUI archive
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/linux/gui/bin dist/linux/gui/lib
          GUI_JAR="$(find desktop-app/build/libs -type f -name '*portable*.jar' | head -n 1)"
          test -n "$GUI_JAR"
          cp "$GUI_JAR" dist/linux/gui/lib/neuralv-desktop.jar
          cat > dist/linux/gui/bin/neuralv <<'SH'
          #!/bin/sh
          set -eu
          SCRIPT_DIR="$(CDPATH= cd -- "$(dirname -- "$0")" && pwd)"
          APP_HOME="$(CDPATH= cd -- "$SCRIPT_DIR/.." && pwd)"
          exec java -jar "$APP_HOME/lib/neuralv-desktop.jar" "$@"
          SH
          chmod +x dist/linux/gui/bin/neuralv
          tar -C dist/linux/gui -czf dist/linux/neuralv-linux.tar.gz .

      - name: Upload Linux GUI log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linux-gui-gradle-log
          path: linux-gui-build.log
          if-no-files-found: warn

      - name: Emit Linux GUI failure annotation
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [ -f linux-gui-build.log ]; then
            tail_text="$(python3 - <<'PY2'
from pathlib import Path
text='\n'.join(Path('linux-gui-build.log').read_text().splitlines()[-60:])
text=text.replace('%', '%25').replace('\r', '%0D').replace('\n', '%0A')
print(text)
PY2
)"
            echo "::error title=Linux GUI tail::$tail_text"
          fi

      - name: Upload Linux GUI payload
        uses: actions/upload-artifact@v4
        with:
          name: neuralv-linux-gui
          path: dist/linux/neuralv-linux.tar.gz
          if-no-files-found: error

  publish-linux-gui:
    name: Publish Linux GUI Branch
    needs:
      - build-linux-gui
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Linux GUI payload
        uses: actions/download-artifact@v4
        with:
          name: neuralv-linux-gui
          path: stage/linux

      - name: Prepare linux-gui-builds payload
        shell: bash
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
        run: |
          set -euo pipefail
          semver="$(awk -F= '/^neuralv.version=/{gsub(/[[:space:]]/, "", $2); print $2}' gradle.properties)"
          test -n "$semver"
          rm -rf publish-linux
          mkdir -p publish-linux/linux
          cp stage/linux/neuralv-linux.tar.gz "publish-linux/linux/neuralv-linux-${semver}.tar.gz"
          cp stage/linux/neuralv-linux.tar.gz publish-linux/linux/neuralv-linux.tar.gz
          sha_linux="$(sha256sum "publish-linux/linux/neuralv-linux-${semver}.tar.gz" | awk '{print $1}')"
          raw_base="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/linux-gui-builds"
          export SEMVER="$semver"
          export SHA_LINUX="$sha_linux"
          export RAW_BASE="$raw_base"
          python3 - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          generated_at = datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
          manifest = {
              "success": True,
              "generated_at": generated_at,
              "release_channel": "main",
              "artifacts": [
                  {
                      "platform": "linux",
                      "channel": "main",
                      "version": os.environ["SEMVER"],
                      "sha256": os.environ["SHA_LINUX"],
                      "download_url": f"{os.environ['RAW_BASE']}/linux/neuralv-linux-{os.environ['SEMVER']}.tar.gz",
                      "install_command": "",
                      "file_name": f"neuralv-linux-{os.environ['SEMVER']}.tar.gz",
                      "notes": ["Portable Linux GUI archive."],
                      "metadata": {}
                  }
              ]
          }
          with open("publish-linux/manifest.json", "w", encoding="utf-8") as f:
              json.dump(manifest, f, ensure_ascii=False, indent=2)
          with open("publish-linux/BUILD_INFO.txt", "w", encoding="utf-8") as f:
              f.write(
                  f"Repository: {os.environ['GITHUB_REPOSITORY']}\n"
                  f"Version: {os.environ['SEMVER']}\n"
                  f"Commit: {os.environ['GITHUB_SHA']}\n"
                  f"Workflow Run: {os.environ['GITHUB_SERVER_URL']}/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}\n"
                  f"Built At: {generated_at}\n"
              )
          PY

      - name: Publish linux-gui-builds branch
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          rm -rf /tmp/linux-gui-builds
          mkdir -p /tmp/linux-gui-builds
          cp -R publish-linux/. /tmp/linux-gui-builds/
          cd /tmp/linux-gui-builds
          git init
          git checkout -b linux-gui-builds
          git add .
          semver="$(awk -F= '/^neuralv.version=/{gsub(/[[:space:]]/, "", $2); print $2}' "${GITHUB_WORKSPACE}/gradle.properties")"
          git -c user.name="github-actions[bot]" -c user.email="41898282+github-actions[bot]@users.noreply.github.com" commit -m "Publish Linux GUI ${semver} for ${GITHUB_SHA} [skip ci]"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin linux-gui-builds

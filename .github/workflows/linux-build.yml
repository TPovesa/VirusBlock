name: Linux GUI Build

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/linux-build.yml'
      - 'desktop-app/**'
      - 'desktop-core/**'
      - 'gradle/**'
      - 'gradle.properties'
      - 'gradlew'
      - 'settings-desktop.gradle.kts'
      - 'build.gradle.kts'
      - 'branding/**'
  workflow_dispatch:

concurrency:
  group: linux-gui-build-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-linux-gui:
    name: Build Linux GUI
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Build Linux desktop GUI distributable
        shell: bash
        run: |
          set -uo pipefail
          set +e
          ./gradlew --settings-file settings-desktop.gradle.kts :desktop-app:createDistributable --stacktrace --no-daemon --console=plain 2>&1 | tee linux-gui-build.log
          status=${PIPESTATUS[0]}
          set -e
          echo "LINUX_GUI_BUILD_EXIT=$status" >> "$GITHUB_ENV"

      - name: Package Linux GUI archive
        shell: bash
        run: |
          set -euo pipefail
          if [ "${LINUX_GUI_BUILD_EXIT:-0}" != "0" ]; then
            echo "Gradle desktop build failed earlier; skip packaging" >&2
            exit 1
          fi
          rm -rf dist/linux
          mkdir -p dist/linux
          APP_DIR="$(find desktop-app/build/compose/binaries -type d -name 'NeuralV' -path '*app/*' | head -n 1 || true)"
          if [ -z "$APP_DIR" ]; then
            APP_DIR="$(find desktop-app/build/compose/binaries -type d -name 'NeuralV' | head -n 1 || true)"
          fi
          test -n "$APP_DIR"
          cp -R "$APP_DIR" dist/linux/NeuralV
          tar -C dist/linux -czf dist/linux/neuralv-linux.tar.gz NeuralV

      - name: Upload Linux GUI log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linux-gui-gradle-log
          path: linux-gui-build.log
          if-no-files-found: warn

      - name: Emit Linux GUI failure annotation
        if: env.LINUX_GUI_BUILD_EXIT != '0'
        shell: bash
        run: |
          set -euo pipefail
          if [ -f linux-gui-build.log ]; then
            summary="$(grep -E '(^e: |^FAILURE:|BUILD FAILED|Unresolved reference|Could not |No such |not found|Exception|Execution failed)' linux-gui-build.log | tail -n 20 | tr '\n' ' ' | sed 's/[[:space:]]\\+/ /g' | cut -c1-1800 || true)"
            if [ -z "$summary" ]; then
              summary="$(tail -n 80 linux-gui-build.log | tr '\n' ' ' | sed 's/[[:space:]]\\+/ /g' | cut -c1-1800)"
            fi
          else
            summary="linux-gui-build.log was not generated"
          fi
          {
            echo "### Linux desktop build failure"
            echo
            echo "$summary"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "::error file=.github/workflows/linux-build.yml,line=39::$summary"
          exit 1

      - name: Upload Linux GUI payload
        uses: actions/upload-artifact@v4
        with:
          name: neuralv-linux-gui
          path: dist/linux/neuralv-linux.tar.gz
          if-no-files-found: error

  publish-linux-gui:
    name: Publish Linux GUI Branch
    needs:
      - build-linux-gui
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Linux GUI payload
        uses: actions/download-artifact@v4
        with:
          name: neuralv-linux-gui
          path: stage/linux

      - name: Prepare linux-gui-builds payload
        shell: bash
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
        run: |
          set -euo pipefail
          semver="$(awk -F= '/^neuralv.version=/{gsub(/[[:space:]]/, "", $2); print $2}' gradle.properties)"
          test -n "$semver"
          rm -rf publish-linux
          mkdir -p publish-linux/linux
          cp stage/linux/neuralv-linux.tar.gz "publish-linux/linux/neuralv-linux-${semver}.tar.gz"
          cp stage/linux/neuralv-linux.tar.gz publish-linux/linux/neuralv-linux.tar.gz
          sha_linux="$(sha256sum "publish-linux/linux/neuralv-linux-${semver}.tar.gz" | awk '{print $1}')"
          raw_base="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/linux-gui-builds"
          export SEMVER="$semver"
          export SHA_LINUX="$sha_linux"
          export RAW_BASE="$raw_base"
          python3 - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          generated_at = datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
          manifest = {
              "success": True,
              "generated_at": generated_at,
              "release_channel": "main",
              "artifacts": [
                  {
                      "platform": "linux",
                      "channel": "main",
                      "version": os.environ["SEMVER"],
                      "sha256": os.environ["SHA_LINUX"],
                      "download_url": f"{os.environ['RAW_BASE']}/linux/neuralv-linux-{os.environ['SEMVER']}.tar.gz",
                      "install_command": "",
                      "file_name": f"neuralv-linux-{os.environ['SEMVER']}.tar.gz",
                      "notes": ["Portable Linux GUI archive."],
                      "metadata": {}
                  }
              ]
          }
          with open("publish-linux/manifest.json", "w", encoding="utf-8") as f:
              json.dump(manifest, f, ensure_ascii=False, indent=2)
          with open("publish-linux/BUILD_INFO.txt", "w", encoding="utf-8") as f:
              f.write(
                  f"Repository: {os.environ['GITHUB_REPOSITORY']}\n"
                  f"Version: {os.environ['SEMVER']}\n"
                  f"Commit: {os.environ['GITHUB_SHA']}\n"
                  f"Workflow Run: {os.environ['GITHUB_SERVER_URL']}/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}\n"
                  f"Built At: {generated_at}\n"
              )
          PY

      - name: Publish linux-gui-builds branch
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          rm -rf /tmp/linux-gui-builds
          mkdir -p /tmp/linux-gui-builds
          cp -R publish-linux/. /tmp/linux-gui-builds/
          cd /tmp/linux-gui-builds
          git init
          git checkout -b linux-gui-builds
          git add .
          semver="$(awk -F= '/^neuralv.version=/{gsub(/[[:space:]]/, "", $2); print $2}' "${GITHUB_WORKSPACE}/gradle.properties")"
          git -c user.name="github-actions[bot]" -c user.email="41898282+github-actions[bot]@users.noreply.github.com" commit -m "Publish Linux GUI ${semver} for ${GITHUB_SHA} [skip ci]"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin linux-gui-builds

name: Windows Build

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/windows-build.yml'
      - 'windows-native/install/**'
      - 'windows-native/setup/**'
      - 'windows-winui/**'
      - 'versions/windows.txt'
      - 'branding/**'
  workflow_dispatch:

concurrency:
  group: windows-build-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows WinUI GUI
    runs-on: windows-latest
    outputs:
      release_version: ${{ steps.release_version.outputs.semver }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Windows release version
        id: release_version
        shell: bash
        run: |
          set -euo pipefail
          semver="$(tr -d '[:space:]' < versions/windows.txt)"
          echo "$semver" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'
          echo "semver=$semver" >> "$GITHUB_OUTPUT"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: windows-winui-nuget-${{ runner.os }}-${{ hashFiles('windows-winui/**', 'versions/windows.txt', '.github/workflows/windows-build.yml') }}
          restore-keys: |
            windows-winui-nuget-${{ runner.os }}-

      - name: Restore Windows projects
        shell: pwsh
        run: |
          dotnet restore windows-winui/NeuralV.Windows/NeuralV.Windows.csproj
          dotnet restore windows-winui/NeuralV.Cmd/NeuralV.Cmd.csproj
          dotnet restore windows-winui/NeuralV.Launcher/NeuralV.Launcher.csproj
          dotnet restore windows-winui/NeuralV.UpdateHost/NeuralV.UpdateHost.csproj
          dotnet restore windows-winui/NeuralV.Updater/NeuralV.Updater.csproj
          dotnet restore windows-winui/NeuralV.Setup/NeuralV.Setup.csproj

      - name: Publish Windows WinUI client
        shell: pwsh
        env:
          NEURALV_VERSION: ${{ steps.release_version.outputs.semver }}
        run: |
          $semver = "${env:NEURALV_VERSION}"
          $assemblyVersion = "$semver.0"
          Remove-Item -Recurse -Force dist\windows -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path dist\windows\NeuralV | Out-Null
          New-Item -ItemType Directory -Force -Path dist\windows\NeuralV\bin | Out-Null
          New-Item -ItemType Directory -Force -Path dist\windows\NeuralV\libs | Out-Null
          dotnet publish windows-winui/NeuralV.Windows/NeuralV.Windows.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:Version=$semver `
            -p:InformationalVersion=$semver `
            -p:AssemblyVersion=$assemblyVersion `
            -p:FileVersion=$assemblyVersion `
            -p:WindowsPackageType=None `
            -p:PublishSingleFile=false `
            -o dist\windows\NeuralV\libs 2>&1 | Tee-Object -FilePath windows-build.log
          "WINDOWS_WINUI_BUILD_EXIT=$LASTEXITCODE" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Publish Windows launcher
        if: env.WINDOWS_WINUI_BUILD_EXIT == '0'
        shell: pwsh
        env:
          NEURALV_VERSION: ${{ steps.release_version.outputs.semver }}
        run: |
          $semver = "${env:NEURALV_VERSION}"
          $assemblyVersion = "$semver.0"
          Remove-Item -Recurse -Force dist\windows\launcher-temp -ErrorAction SilentlyContinue
          dotnet publish windows-winui/NeuralV.Launcher/NeuralV.Launcher.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:Version=$semver `
            -p:InformationalVersion=$semver `
            -p:AssemblyVersion=$assemblyVersion `
            -p:FileVersion=$assemblyVersion `
            -o dist\windows\launcher-temp
          Copy-Item (Resolve-Path 'dist/windows/launcher-temp/NeuralV.exe') 'dist/windows/NeuralV/NeuralV.exe' -Force

      - name: Publish Windows CLI companion
        if: env.WINDOWS_WINUI_BUILD_EXIT == '0'
        shell: pwsh
        env:
          NEURALV_VERSION: ${{ steps.release_version.outputs.semver }}
        run: |
          $semver = "${env:NEURALV_VERSION}"
          $assemblyVersion = "$semver.0"
          Remove-Item -Recurse -Force dist\windows\cli-temp -ErrorAction SilentlyContinue
          dotnet publish windows-winui/NeuralV.Cmd/NeuralV.Cmd.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:Version=$semver `
            -p:InformationalVersion=$semver `
            -p:AssemblyVersion=$assemblyVersion `
            -p:FileVersion=$assemblyVersion `
            -o dist\windows\cli-temp
          Copy-Item (Resolve-Path 'dist/windows/cli-temp/neuralv.exe') 'dist/windows/NeuralV/bin/neuralv.exe' -Force

      - name: Publish Windows updater host
        if: env.WINDOWS_WINUI_BUILD_EXIT == '0'
        shell: pwsh
        env:
          NEURALV_VERSION: ${{ steps.release_version.outputs.semver }}
        run: |
          $semver = "${env:NEURALV_VERSION}"
          $assemblyVersion = "$semver.0"
          Remove-Item -Recurse -Force dist\windows\updater-host-temp -ErrorAction SilentlyContinue
          dotnet publish windows-winui/NeuralV.UpdateHost/NeuralV.UpdateHost.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:Version=$semver `
            -p:InformationalVersion=$semver `
            -p:AssemblyVersion=$assemblyVersion `
            -p:FileVersion=$assemblyVersion `
            -p:PublishSingleFile=false `
            -o dist\windows\updater-host-temp
          Copy-Item 'dist/windows/updater-host-temp/*' 'dist/windows/NeuralV/libs/' -Force -Recurse

      - name: Publish Windows updater
        if: env.WINDOWS_WINUI_BUILD_EXIT == '0'
        shell: pwsh
        env:
          NEURALV_VERSION: ${{ steps.release_version.outputs.semver }}
        run: |
          $semver = "${env:NEURALV_VERSION}"
          $assemblyVersion = "$semver.0"
          Remove-Item -Recurse -Force dist\windows\updater-temp -ErrorAction SilentlyContinue
          dotnet publish windows-winui/NeuralV.Updater/NeuralV.Updater.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:Version=$semver `
            -p:InformationalVersion=$semver `
            -p:AssemblyVersion=$assemblyVersion `
            -p:FileVersion=$assemblyVersion `
            -o dist\windows\updater-temp
          Copy-Item (Resolve-Path 'dist/windows/updater-temp/neuralv-updater.exe') 'dist/windows/NeuralV/bin/neuralv-updater.exe' -Force
          New-Item -ItemType File -Force -Path dist\windows\NeuralV\log.txt | Out-Null

      - name: Smoke test published Windows client
        if: env.WINDOWS_WINUI_BUILD_EXIT == '0'
        shell: pwsh
        run: |
          function Get-NeuralVSmokeDetails {
            $parts = @()
            $candidates = @(
              'dist/windows/NeuralV/smoke-error.txt',
              'dist/windows/NeuralV/libs/smoke-error.txt',
              'dist/windows/NeuralV/log.txt',
              "$HOME/AppData/Local/NeuralV/log.txt",
              "$HOME/AppData/Roaming/NeuralV/log.txt"
            )
            foreach ($candidate in $candidates) {
              if (Test-Path $candidate) {
                $content = (Get-Content $candidate -ErrorAction SilentlyContinue | Select-Object -Last 120) -join ' '
                if ($content) {
                  $parts += "[$candidate] $content"
                }
              }
            }
            if (-not $parts -and (Test-Path 'dist/windows/NeuralV')) {
              $listing = (Get-ChildItem 'dist/windows/NeuralV' -Force -Recurse | Select-Object -ExpandProperty FullName) -join ', '
              if ($listing) {
                $parts += "[dist/windows/NeuralV files] $listing"
              }
            }
            return (($parts -join ' | ') -replace '\s+', ' ').Trim()
          }
          $exe = Resolve-Path 'dist/windows/NeuralV/libs/NeuralV.Gui.exe'
          $env:NEURALV_SMOKE_TEST = '1'
          $env:NEURALV_SKIP_UPDATER = '1'
          $env:NEURALV_INSTALL_ROOT = Resolve-Path 'dist/windows/NeuralV'
          $proc = Start-Process -FilePath $exe -ArgumentList '--smoke-test' -PassThru -WorkingDirectory (Split-Path $exe)
          if (-not $proc.WaitForExit(30000)) {
            $details = Get-NeuralVSmokeDetails
            try { $proc.Kill($true) } catch {}
            if ($details) {
              Write-Host "::error file=windows-winui/NeuralV.Windows/App.xaml.cs,line=1::$details"
              throw "Windows smoke test timed out after 30 seconds. $details"
            }
            throw 'Windows smoke test timed out after 30 seconds'
          }
          if ($proc.ExitCode -ne 0) {
            $details = Get-NeuralVSmokeDetails
            if ($details) {
              Write-Host "::error file=windows-winui/NeuralV.Windows/App.xaml.cs,line=1::$details"
              throw "Windows smoke test failed with exit code $($proc.ExitCode). $details"
            }
            throw "Windows smoke test failed with exit code $($proc.ExitCode)"
          }

      - name: Package Windows portable archive
        shell: pwsh
        run: |
          if ($env:WINDOWS_WINUI_BUILD_EXIT -ne '0') {
            throw "Windows WinUI publish failed earlier; skip packaging"
          }
          Compress-Archive -Path dist\windows\NeuralV -DestinationPath dist\windows\neuralv-windows.zip -Force

      - name: Build Windows setup bootstrapper
        shell: pwsh
        env:
          NEURALV_VERSION: ${{ steps.release_version.outputs.semver }}
        run: |
          $semver = "${env:NEURALV_VERSION}"
          $assemblyVersion = "$semver.0"
          Remove-Item -Recurse -Force dist\windows\setup-temp -ErrorAction SilentlyContinue
          dotnet publish windows-winui/NeuralV.Setup/NeuralV.Setup.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:Version=$semver `
            -p:InformationalVersion=$semver `
            -p:AssemblyVersion=$assemblyVersion `
            -p:FileVersion=$assemblyVersion `
            -p:PublishSingleFile=true `
            -o dist\windows\setup-temp
          Copy-Item 'dist/windows/setup-temp/neuralv-setup.exe' 'dist/windows/neuralv-setup.exe' -Force

      - name: Upload Windows build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-winui-log
          path: windows-build.log
          if-no-files-found: warn

      - name: Upload Windows runtime smoke log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-winui-runtime-log
          path: |
            dist/windows/NeuralV/log.txt
            dist/windows/NeuralV/smoke-error.txt
            dist/windows/NeuralV/libs/smoke-error.txt
            ~/AppData/Local/NeuralV/log.txt
            ~/AppData/Roaming/NeuralV/log.txt
          if-no-files-found: warn

      - name: Emit Windows build failure annotation
        if: env.WINDOWS_WINUI_BUILD_EXIT != '0'
        shell: pwsh
        run: |
          $summary = @()
          if (Test-Path windows-build.log) {
            $summary = Select-String -Path windows-build.log -Pattern 'error ','FAILED','Exception','not found','No such','NETSDK','MSB' |
              Select-Object -Last 20 |
              ForEach-Object { $_.Line.Trim() }
            if (-not $summary) {
              $summary = Get-Content windows-build.log -Tail 80
            }
          } else {
            $summary = @('windows-build.log was not generated')
          }
          $text = (($summary -join ' ') -replace '\s+', ' ')
          if ($text.Length -gt 1800) { $text = $text.Substring(0, 1800) }
          @(
            '### Windows WinUI build failure',
            '',
            $text
          ) | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          Write-Host "::error file=.github/workflows/windows-build.yml,line=36::$text"
          exit 1

      - name: Upload Windows GUI bundle
        uses: actions/upload-artifact@v4
        with:
          name: neuralv-windows
          path: |
            dist/windows/NeuralV/**
            dist/windows/neuralv-windows.zip
            dist/windows/neuralv-setup.exe
          if-no-files-found: error

  publish-windows:
    name: Publish Windows Branch
    needs:
      - build-windows
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Windows bundle
        uses: actions/download-artifact@v4
        with:
          name: neuralv-windows
          path: stage/windows

      - name: Publish Windows release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: windows-v${{ needs.build-windows.outputs.release_version }}
          name: NeuralV Windows ${{ needs.build-windows.outputs.release_version }}
          target_commitish: ${{ github.sha }}
          overwrite_files: true
          files: |
            stage/windows/neuralv-windows.zip
            stage/windows/neuralv-setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare windows-builds payload
        shell: bash
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
        run: |
          set -euo pipefail
          semver="${{ needs.build-windows.outputs.release_version }}"
          test -n "$semver"
          rm -rf publish-windows
          mkdir -p publish-windows/windows publish-windows/install
          cp windows-native/install/windows.ps1 publish-windows/install/windows.ps1
          cp windows-native/install/windows.cmd publish-windows/install/windows.cmd
          sha_windows="$(sha256sum stage/windows/neuralv-windows.zip | awk '{print $1}')"
          sha_setup="$(sha256sum stage/windows/neuralv-setup.exe | awk '{print $1}')"
          raw_base="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/windows-builds"
          release_base="https://github.com/${GITHUB_REPOSITORY}/releases/download/windows-v${semver}"
          export SEMVER="$semver"
          export SHA_WINDOWS="$sha_windows"
          export SHA_SETUP="$sha_setup"
          export RAW_BASE="$raw_base"
          export RELEASE_BASE="$release_base"
          python3 - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          generated_at = datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
          powershell_cmd = f"powershell -NoProfile -ExecutionPolicy Bypass -Command \"irm {os.environ['RAW_BASE']}/install/windows.ps1 | iex\""
          cmd_cmd = f"curl.exe -L {os.environ['RAW_BASE']}/install/windows.cmd -o %TEMP%\\neuralv-install.cmd && call %TEMP%\\neuralv-install.cmd"
          manifest = {
              "success": True,
              "generated_at": generated_at,
              "release_channel": "beta",
              "artifacts": [
                  {
                      "platform": "windows",
                      "channel": "beta",
                      "version": os.environ["SEMVER"],
                      "sha256": os.environ["SHA_WINDOWS"],
                      "download_url": f"{os.environ['RELEASE_BASE']}/neuralv-windows.zip",
                      "install_command": powershell_cmd,
                      "file_name": "neuralv-windows.zip",
                      "notes": ["WinUI Windows portable archive."],
                      "metadata": {
                          "setupUrl": f"{os.environ['RELEASE_BASE']}/neuralv-setup.exe",
                          "bundledComponents": ["gui", "cli", "updater"],
                          "layout": "root-bin-libs",
                          "rootEntries": ["NeuralV.exe", "log.txt", "bin", "libs"],
                          "cliBinaryName": "neuralv.exe",
                          "guiBinaryName": "NeuralV.Gui.exe",
                          "launcherBinaryName": "NeuralV.exe",
                          "updaterBinaryName": "neuralv-updater.exe",
                          "updaterHostBinaryName": "neuralv-updater-host.exe",
                          "guiRelativePath": "libs/NeuralV.Gui.exe",
                          "cliRelativePath": "bin/neuralv.exe",
                          "updaterRelativePath": "bin/neuralv-updater.exe",
                          "updaterHostRelativePath": "libs/neuralv-updater-host.exe",
                          "logRelativePath": "log.txt",
                          "binDirectory": "bin",
                          "libsDirectory": "libs",
                          "portableArtifactPath": "releases/windows-v{version}/neuralv-windows.zip",
                          "setupArtifactPath": "releases/windows-v{version}/neuralv-setup.exe",
                          "setupSha256": os.environ["SHA_SETUP"],
                          "portableUrl": f"{os.environ['RELEASE_BASE']}/neuralv-windows.zip",
                          "powershellInstallCommand": powershell_cmd,
                          "cmdInstallCommand": cmd_cmd,
                          "installScriptPs1": f"{os.environ['RAW_BASE']}/install/windows.ps1",
                          "installScriptCmd": f"{os.environ['RAW_BASE']}/install/windows.cmd",
                          "releaseTag": f"windows-v{os.environ['SEMVER']}",
                          "wingetPackageId": "NeuralV.NeuralV",
                          "wingetInstallCommand": "winget install --id NeuralV.NeuralV -e",
                          "wingetUpgradeCommand": "winget upgrade --id NeuralV.NeuralV -e",
                          "wingetUninstallCommand": "winget uninstall --id NeuralV.NeuralV -e",
                          "directDownloadLabel": "Скачать portable",
                          "setupDownloadLabel": "Скачать setup",
                          "nativeClient": True,
                          "uiStack": "winui3",
                          "installMode": "bootstrap-setup",
                          "setupCreatesShortcuts": True,
                          "powershellCreatesShortcuts": True,
                          "cmdCreatesShortcuts": True,
                          "portableCreatesShortcuts": False
                      }
                  }
              ]
          }
          with open("publish-windows/manifest.json", "w", encoding="utf-8") as f:
              json.dump(manifest, f, ensure_ascii=False, indent=2)
          with open("publish-windows/BUILD_INFO.txt", "w", encoding="utf-8") as f:
              f.write(
                  f"Repository: {os.environ['GITHUB_REPOSITORY']}\n"
                  f"Version: {os.environ['SEMVER']}\n"
                  f"Commit: {os.environ['GITHUB_SHA']}\n"
                  f"Workflow Run: {os.environ['GITHUB_SERVER_URL']}/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}\n"
                  f"Built At: {generated_at}\n"
              )
          PY

      - name: Publish windows-builds branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: windows-builds
          publish_dir: publish-windows
          force_orphan: true
          enable_jekyll: false
          commit_message: Publish Windows GUI ${{ needs.build-windows.outputs.release_version }} for ${{ github.sha }} [skip ci]

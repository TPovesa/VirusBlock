name: Windows Build

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/windows-build.yml'
      - 'desktop-app/**'
      - 'desktop-core/**'
      - 'gradle/**'
      - 'gradle.properties'
      - 'gradlew'
      - 'gradlew.bat'
      - 'settings-desktop.gradle.kts'
      - 'build.gradle.kts'
      - 'branding/**'
  workflow_dispatch:

concurrency:
  group: windows-build-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows GUI
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Compose and Kotlin native dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~\.konan
          key: windows-konan-${{ runner.os }}-${{ hashFiles('desktop-app/build.gradle.kts', 'desktop-core/build.gradle.kts', 'gradle/libs.versions.toml', 'settings-desktop.gradle.kts') }}
          restore-keys: |
            windows-konan-${{ runner.os }}-

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Cache Compose prepare artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.konan
            desktop-app/build/compose
          key: windows-compose-${{ runner.os }}-${{ hashFiles('desktop-app/**', 'desktop-core/**', 'branding/**', 'gradle.properties', 'settings-desktop.gradle.kts', 'build.gradle.kts') }}
          restore-keys: |
            windows-compose-${{ runner.os }}-

      - name: Generate Windows icon
        shell: pwsh
        run: |
          python -m pip install --disable-pip-version-check pillow
          New-Item -ItemType Directory -Force -Path branding\generated | Out-Null
          @'
          from PIL import Image
          img = Image.open(r"app/src/main/res/mipmap-xxxhdpi/ic_launcher.png").convert("RGBA")
          img.save(r"branding/generated/neuralv.ico", sizes=[(256, 256), (128, 128), (64, 64), (48, 48), (32, 32), (16, 16)])
          '@ | python -

      - name: Build Windows desktop GUI distributable
        shell: pwsh
        run: |
          & .\gradlew.bat --settings-file settings-desktop.gradle.kts :desktop-app:createDistributable --stacktrace --no-daemon --console=plain 2>&1 | Tee-Object -FilePath windows-build.log
          "WINDOWS_GUI_BUILD_EXIT=$LASTEXITCODE" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Package Windows archive
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force dist\windows -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path dist\windows | Out-Null
          $appDir = Get-ChildItem -Path "desktop-app/build/compose/binaries" -Directory -Recurse |
            Where-Object { $_.Name -eq "NeuralV" -and $_.FullName -match "[\\\\/]app[\\\\/]" } |
            Select-Object -First 1
          if (-not $appDir) { throw "Bundled Windows app directory not found under desktop-app/build/compose/binaries" }
          Copy-Item $appDir.FullName dist\windows\NeuralV -Recurse -Force
          Compress-Archive -Path dist\windows\NeuralV -DestinationPath dist\windows\neuralv-windows.zip -Force

      - name: Upload Windows build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-gradle-log
          path: windows-build.log
          if-no-files-found: warn

      - name: Emit Windows GUI failure annotation
        if: env.WINDOWS_GUI_BUILD_EXIT != '0'
        shell: pwsh
        run: |
          $summary = @()
          if (Test-Path windows-build.log) {
            $summary = Select-String -Path windows-build.log -Pattern '^e: ','^FAILURE:','BUILD FAILED','Unresolved reference','Could not ','No such ','not found','Exception','Execution failed' |
              Select-Object -Last 20 |
              ForEach-Object { $_.Line.Trim() }
            if (-not $summary) {
              $summary = Get-Content windows-build.log -Tail 80
            }
          } else {
            $summary = @('windows-build.log was not generated')
          }
          $text = (($summary -join ' ') -replace '\s+', ' ')
          if ($text.Length -gt 1800) { $text = $text.Substring(0, 1800) }
          @(
            '### Windows desktop build failure',
            '',
            $text
          ) | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          Write-Host "::error file=.github/workflows/windows-build.yml,line=44::$text"
          exit 1

      - name: Upload Windows bundle
        uses: actions/upload-artifact@v4
        with:
          name: neuralv-windows-gui
          path: dist/windows/neuralv-windows.zip
          if-no-files-found: error

  publish-windows:
    name: Publish Windows Branch
    needs:
      - build-windows
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Windows bundle
        uses: actions/download-artifact@v4
        with:
          name: neuralv-windows-gui
          path: stage/windows

      - name: Prepare windows-builds payload
        shell: bash
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
        run: |
          set -euo pipefail
          semver="$(awk -F= '/^neuralv.version=/{gsub(/[[:space:]]/, "", $2); print $2}' gradle.properties)"
          test -n "$semver"
          rm -rf publish-windows
          mkdir -p publish-windows/windows
          cp stage/windows/neuralv-windows.zip "publish-windows/windows/neuralv-windows-${semver}.zip"
          cp stage/windows/neuralv-windows.zip publish-windows/windows/neuralv-windows.zip
          sha_windows="$(sha256sum "publish-windows/windows/neuralv-windows-${semver}.zip" | awk '{print $1}')"
          raw_base="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/windows-builds"
          export SEMVER="$semver"
          export SHA_WINDOWS="$sha_windows"
          export RAW_BASE="$raw_base"
          python3 - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          generated_at = datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
          manifest = {
              "success": True,
              "generated_at": generated_at,
              "release_channel": "beta",
              "artifacts": [
                  {
                      "platform": "windows",
                      "channel": "beta",
                      "version": os.environ["SEMVER"],
                      "sha256": os.environ["SHA_WINDOWS"],
                      "download_url": f"{os.environ['RAW_BASE']}/windows/neuralv-windows-{os.environ['SEMVER']}.zip",
                      "install_command": "winget install --id NeuralV.NeuralV -e",
                      "file_name": f"neuralv-windows-{os.environ['SEMVER']}.zip",
                      "notes": ["Windows GUI archive."],
                      "metadata": {
                          "wingetPackageId": "NeuralV.NeuralV",
                          "wingetInstallCommand": "winget install --id NeuralV.NeuralV -e",
                          "wingetUpgradeCommand": "winget upgrade --id NeuralV.NeuralV -e",
                          "wingetUninstallCommand": "winget uninstall --id NeuralV.NeuralV -e",
                          "directDownloadLabel": "Скачать GUI zip"
                      }
                  }
              ]
          }
          with open("publish-windows/manifest.json", "w", encoding="utf-8") as f:
              json.dump(manifest, f, ensure_ascii=False, indent=2)
          with open("publish-windows/BUILD_INFO.txt", "w", encoding="utf-8") as f:
              f.write(
                  f"Repository: {os.environ['GITHUB_REPOSITORY']}\n"
                  f"Version: {os.environ['SEMVER']}\n"
                  f"Commit: {os.environ['GITHUB_SHA']}\n"
                  f"Workflow Run: {os.environ['GITHUB_SERVER_URL']}/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}\n"
                  f"Built At: {generated_at}\n"
              )
          PY

      - name: Publish windows-builds branch
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          rm -rf /tmp/windows-builds
          mkdir -p /tmp/windows-builds
          cp -R publish-windows/. /tmp/windows-builds/
          cd /tmp/windows-builds
          git init
          git checkout -b windows-builds
          git add .
          semver="$(awk -F= '/^neuralv.version=/{gsub(/[[:space:]]/, "", $2); print $2}' "${GITHUB_WORKSPACE}/gradle.properties")"
          git -c user.name="github-actions[bot]" -c user.email="41898282+github-actions[bot]@users.noreply.github.com" commit -m "Publish Windows bundle ${semver} for ${GITHUB_SHA} [skip ci]"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin windows-builds

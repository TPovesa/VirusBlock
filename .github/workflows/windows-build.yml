name: Windows Build

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/windows-build.yml'
      - 'windows-native/install/**'
      - 'windows-native/setup/**'
      - 'windows-winui/**'
      - 'versions/windows.txt'
      - 'branding/**'
  workflow_dispatch:

concurrency:
  group: windows-build-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows WinUI GUI
    runs-on: windows-latest
    outputs:
      release_version: ${{ steps.release_version.outputs.semver }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Windows release version
        id: release_version
        shell: bash
        run: |
          set -euo pipefail
          semver="$(tr -d '[:space:]' < versions/windows.txt)"
          echo "$semver" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'
          echo "semver=$semver" >> "$GITHUB_OUTPUT"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: windows-winui-nuget-${{ runner.os }}-${{ hashFiles('windows-winui/**', 'versions/windows.txt', '.github/workflows/windows-build.yml') }}
          restore-keys: |
            windows-winui-nuget-${{ runner.os }}-

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Restore Windows WinUI project
        shell: pwsh
        run: |
          dotnet restore windows-winui/NeuralV.Windows/NeuralV.Windows.csproj

      - name: Publish Windows WinUI client
        shell: pwsh
        env:
          NEURALV_VERSION: ${{ steps.release_version.outputs.semver }}
        run: |
          $semver = "${env:NEURALV_VERSION}"
          $assemblyVersion = "$semver.0"
          Remove-Item -Recurse -Force dist\windows -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path dist\windows\NeuralV | Out-Null
          dotnet publish windows-winui/NeuralV.Windows/NeuralV.Windows.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:Version=$semver `
            -p:InformationalVersion=$semver `
            -p:AssemblyVersion=$assemblyVersion `
            -p:FileVersion=$assemblyVersion `
            -p:WindowsPackageType=None `
            -p:PublishSingleFile=false `
            -o dist\windows\NeuralV 2>&1 | Tee-Object -FilePath windows-build.log
          "WINDOWS_WINUI_BUILD_EXIT=$LASTEXITCODE" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Smoke test published Windows client
        if: env.WINDOWS_WINUI_BUILD_EXIT == '0'
        shell: pwsh
        run: |
          $exe = Resolve-Path 'dist/windows/NeuralV/NeuralV.exe'
          $proc = Start-Process -FilePath $exe -ArgumentList '--smoke-test' -PassThru
          if (-not $proc.WaitForExit(30000)) {
            try { $proc.Kill($true) } catch {}
            throw 'Windows smoke test timed out after 30 seconds'
          }
          if ($proc.ExitCode -ne 0) {
            throw "Windows smoke test failed with exit code $($proc.ExitCode)"
          }

      - name: Package Windows portable archive
        shell: pwsh
        run: |
          if ($env:WINDOWS_WINUI_BUILD_EXIT -ne '0') {
            throw "Windows WinUI publish failed earlier; skip packaging"
          }
          Compress-Archive -Path dist\windows\NeuralV -DestinationPath dist\windows\neuralv-windows.zip -Force

      - name: Build Windows setup with Inno Setup
        shell: pwsh
        env:
          NEURALV_VERSION: ${{ steps.release_version.outputs.semver }}
        run: |
          $semver = "${env:NEURALV_VERSION}"
          if (-not $semver) { throw 'versions/windows.txt is missing a valid semver' }
          $env:NEURALV_VERSION = $semver
          $env:NEURALV_STAGE_DIR = (Resolve-Path 'dist/windows').Path
          $env:NEURALV_OUTPUT_DIR = (Resolve-Path 'dist/windows').Path
          & 'C:\Program Files (x86)\Inno Setup 6\ISCC.exe' '/Qp' 'windows-native/setup/NeuralV.iss'
          if (-not (Test-Path 'dist/windows/neuralv-setup.exe')) {
            throw 'Inno Setup did not produce neuralv-setup.exe'
          }

      - name: Upload Windows build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-winui-log
          path: windows-build.log
          if-no-files-found: warn

      - name: Emit Windows build failure annotation
        if: env.WINDOWS_WINUI_BUILD_EXIT != '0'
        shell: pwsh
        run: |
          $summary = @()
          if (Test-Path windows-build.log) {
            $summary = Select-String -Path windows-build.log -Pattern 'error ','FAILED','Exception','not found','No such','NETSDK','MSB' |
              Select-Object -Last 20 |
              ForEach-Object { $_.Line.Trim() }
            if (-not $summary) {
              $summary = Get-Content windows-build.log -Tail 80
            }
          } else {
            $summary = @('windows-build.log was not generated')
          }
          $text = (($summary -join ' ') -replace '\s+', ' ')
          if ($text.Length -gt 1800) { $text = $text.Substring(0, 1800) }
          @(
            '### Windows WinUI build failure',
            '',
            $text
          ) | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          Write-Host "::error file=.github/workflows/windows-build.yml,line=36::$text"
          exit 1

      - name: Upload Windows GUI bundle
        uses: actions/upload-artifact@v4
        with:
          name: neuralv-windows
          path: |
            dist/windows/NeuralV/**
            dist/windows/neuralv-windows.zip
            dist/windows/neuralv-setup.exe
          if-no-files-found: error

  publish-windows:
    name: Publish Windows Branch
    needs:
      - build-windows
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Windows bundle
        uses: actions/download-artifact@v4
        with:
          name: neuralv-windows
          path: stage/windows

      - name: Prepare windows-builds payload
        shell: bash
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
        run: |
          set -euo pipefail
          semver="${{ needs.build-windows.outputs.release_version }}"
          test -n "$semver"
          rm -rf publish-windows
          mkdir -p publish-windows/windows publish-windows/install
          if [ -d stage/windows/NeuralV ]; then
            cp -R stage/windows/NeuralV publish-windows/windows/NeuralV
          fi
          cp stage/windows/neuralv-windows.zip "publish-windows/windows/neuralv-windows-${semver}.zip"
          cp stage/windows/neuralv-windows.zip publish-windows/windows/neuralv-windows.zip
          cp stage/windows/neuralv-setup.exe "publish-windows/windows/neuralv-setup-${semver}.exe"
          cp stage/windows/neuralv-setup.exe publish-windows/windows/neuralv-setup.exe
          cp windows-native/install/windows.ps1 publish-windows/install/windows.ps1
          cp windows-native/install/windows.cmd publish-windows/install/windows.cmd
          sha_windows="$(sha256sum "publish-windows/windows/neuralv-windows-${semver}.zip" | awk '{print $1}')"
          sha_setup="$(sha256sum "publish-windows/windows/neuralv-setup-${semver}.exe" | awk '{print $1}')"
          raw_base="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/windows-builds"
          export SEMVER="$semver"
          export SHA_WINDOWS="$sha_windows"
          export SHA_SETUP="$sha_setup"
          export RAW_BASE="$raw_base"
          python3 - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          generated_at = datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
          powershell_cmd = f"powershell -NoProfile -ExecutionPolicy Bypass -Command \"irm {os.environ['RAW_BASE']}/install/windows.ps1 | iex\""
          cmd_cmd = f"curl.exe -L {os.environ['RAW_BASE']}/install/windows.cmd -o %TEMP%\\neuralv-install.cmd && call %TEMP%\\neuralv-install.cmd"
          manifest = {
              "success": True,
              "generated_at": generated_at,
              "release_channel": "beta",
              "artifacts": [
                  {
                      "platform": "windows",
                      "channel": "beta",
                      "version": os.environ["SEMVER"],
                      "sha256": os.environ["SHA_WINDOWS"],
                      "download_url": f"{os.environ['RAW_BASE']}/windows/neuralv-windows.zip",
                      "install_command": powershell_cmd,
                      "file_name": "neuralv-windows.zip",
                      "notes": ["WinUI Windows portable archive."],
                      "metadata": {
                          "setupUrl": f"{os.environ['RAW_BASE']}/windows/neuralv-setup.exe",
                          "payloadRootPath": "windows/NeuralV/",
                          "portableArtifactPath": "windows/neuralv-windows.zip",
                          "setupArtifactPath": "windows/neuralv-setup.exe",
                          "versionedPortableArtifactPath": f"windows/neuralv-windows-{os.environ['SEMVER']}.zip",
                          "versionedSetupArtifactPath": f"windows/neuralv-setup-{os.environ['SEMVER']}.exe",
                          "setupSha256": os.environ["SHA_SETUP"],
                          "portableUrl": f"{os.environ['RAW_BASE']}/windows/neuralv-windows.zip",
                          "versionedPortableUrl": f"{os.environ['RAW_BASE']}/windows/neuralv-windows-{os.environ['SEMVER']}.zip",
                          "versionedSetupUrl": f"{os.environ['RAW_BASE']}/windows/neuralv-setup-{os.environ['SEMVER']}.exe",
                          "powershellInstallCommand": powershell_cmd,
                          "cmdInstallCommand": cmd_cmd,
                          "installScriptPs1": f"{os.environ['RAW_BASE']}/install/windows.ps1",
                          "installScriptCmd": f"{os.environ['RAW_BASE']}/install/windows.cmd",
                          "wingetPackageId": "NeuralV.NeuralV",
                          "wingetInstallCommand": "winget install --id NeuralV.NeuralV -e",
                          "wingetUpgradeCommand": "winget upgrade --id NeuralV.NeuralV -e",
                          "wingetUninstallCommand": "winget uninstall --id NeuralV.NeuralV -e",
                          "directDownloadLabel": "Скачать portable",
                          "setupDownloadLabel": "Скачать setup",
                          "nativeClient": True,
                          "uiStack": "winui3",
                          "setupCreatesShortcuts": True,
                          "powershellCreatesShortcuts": True,
                          "cmdCreatesShortcuts": True,
                          "portableCreatesShortcuts": False
                      }
                  }
              ]
          }
          with open("publish-windows/manifest.json", "w", encoding="utf-8") as f:
              json.dump(manifest, f, ensure_ascii=False, indent=2)
          with open("publish-windows/BUILD_INFO.txt", "w", encoding="utf-8") as f:
              f.write(
                  f"Repository: {os.environ['GITHUB_REPOSITORY']}\n"
                  f"Version: {os.environ['SEMVER']}\n"
                  f"Commit: {os.environ['GITHUB_SHA']}\n"
                  f"Workflow Run: {os.environ['GITHUB_SERVER_URL']}/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}\n"
                  f"Built At: {generated_at}\n"
              )
          PY

      - name: Publish windows-builds branch
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          rm -rf /tmp/windows-builds
          mkdir -p /tmp/windows-builds
          cp -R publish-windows/. /tmp/windows-builds/
          cd /tmp/windows-builds
          git init
          git checkout -b windows-builds
          git add .
          semver="${{ needs.build-windows.outputs.release_version }}"
          git -c user.name="github-actions[bot]" -c user.email="41898282+github-actions[bot]@users.noreply.github.com" commit -m "Publish Windows GUI ${semver} for ${GITHUB_SHA} [skip ci]"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin windows-builds

name: Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: neuralv-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  backend-check:
    name: Backend Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: shield-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: shield-backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Check backend sources
        run: npm run check

  android-release:
    name: Android Release APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Assemble release APK
        shell: bash
        run: |
          set -o pipefail
          ./gradlew assembleRelease --stacktrace --no-daemon --console=plain 2>&1 | tee gradle-build.log

      - name: Upload Gradle log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-gradle-log
          path: gradle-build.log

      - name: Prepare Android release bundle
        shell: bash
        run: |
          mkdir -p dist/android
          APK_PATH="$(find app/build/outputs/apk/release -name '*.apk' | head -n 1)"
          cp "$APK_PATH" dist/android/neuralv-android-release.apk

      - name: Upload Android release bundle
        uses: actions/upload-artifact@v4
        with:
          name: neuralv-android-release
          path: dist/android/*
          if-no-files-found: error

  desktop-linux:
    name: Linux Desktop GUI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Linux desktop dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2 \
            libgtk-3-0 \
            libx11-6 \
            libxext6 \
            libxrender1 \
            libxtst6 \
            libxi6 \
            libxrandr2 \
            libxinerama1 \
            libxcursor1 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libgbm1 \
            libnss3 \
            libxkbcommon0

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Build Linux desktop distributable
        shell: bash
        run: |
          set -o pipefail
          ./gradlew :desktop-app:createDistributable --stacktrace --no-daemon --console=plain 2>&1 | tee desktop-linux-build.log

      - name: Package Linux desktop archive
        shell: bash
        run: |
          mkdir -p dist/linux
          APP_DIR="$(find desktop-app/build/compose/binaries/main/app -maxdepth 1 -mindepth 1 -type d | head -n 1)"
          test -n "$APP_DIR"
          tar -C "$(dirname "$APP_DIR")" -czf dist/linux/neuralv-linux.tar.gz "$(basename "$APP_DIR")"

      - name: Upload Linux desktop log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-linux-gradle-log
          path: desktop-linux-build.log

      - name: Upload Linux desktop bundle
        uses: actions/upload-artifact@v4
        with:
          name: neuralv-linux-gui
          path: dist/linux/*
          if-no-files-found: error

  desktop-windows:
    name: Windows Desktop GUI
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Windows desktop distributable
        shell: pwsh
        run: |
          .\gradlew.bat :desktop-app:createDistributable --stacktrace --no-daemon --console=plain 2>&1 | Tee-Object -FilePath desktop-windows-build.log

      - name: Package Windows desktop archive
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist\windows | Out-Null
          $appDir = Get-ChildItem desktop-app/build/compose/binaries/main/app -Directory | Select-Object -First 1
          if (-not $appDir) { throw "Desktop app directory not found" }
          Compress-Archive -Path "$($appDir.FullName)\*" -DestinationPath dist\windows\neuralv-windows.zip -Force

      - name: Upload Windows desktop log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows-gradle-log
          path: desktop-windows-build.log

      - name: Upload Windows desktop bundle
        uses: actions/upload-artifact@v4
        with:
          name: neuralv-windows-gui
          path: dist/windows/*
          if-no-files-found: error

  shell-linux:
    name: Linux Shell And Daemon
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build shell binaries
        shell: bash
        run: |
          mkdir -p dist/shell
          cd shell
          go mod tidy
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags='-s -w' -o ../dist/shell/nv ./cmd/nv
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags='-s -w' -o ../dist/shell/neuralv-shell ./cmd/neuralv-shell
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags='-s -w' -o ../dist/shell/neuralvd ./cmd/neuralvd
          cd ..
          tar -C dist/shell -czf dist/shell/nv-linux.tar.gz nv
          tar -C dist/shell -czf dist/shell/neuralv-shell-linux.tar.gz neuralv-shell
          tar -C dist/shell -czf dist/shell/neuralvd-linux.tar.gz neuralvd

      - name: Upload shell bundles
        uses: actions/upload-artifact@v4
        with:
          name: neuralv-shell-linux
          path: |
            dist/shell/nv-linux.tar.gz
            dist/shell/neuralv-shell-linux.tar.gz
            dist/shell/neuralvd-linux.tar.gz
          if-no-files-found: error

  web-neuralv:
    name: NeuralV Website
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/neuralv
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Package site bundle
        shell: bash
        run: |
          mkdir -p dist-export
          (cd dist && zip -qr ../dist-export/neuralv-site.zip .)

      - name: Upload site bundle
        uses: actions/upload-artifact@v4
        with:
          name: neuralv-site
          path: web/neuralv/dist-export/*
          if-no-files-found: error

  publish-neuralv-site:
    name: Publish NeuralV Site Branch
    needs:
      - web-neuralv
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download site bundle
        uses: actions/download-artifact@v4
        with:
          name: neuralv-site
          path: stage/site

      - name: Prepare site branch payload
        shell: bash
        run: |
          set -euo pipefail
          rm -rf publish-site
          mkdir -p publish-site/install
          unzip -q stage/site/neuralv-site.zip -d publish-site
          cp shell/install/linux.sh publish-site/install/linux.sh
          cp shell/install/nv.sh publish-site/install/nv.sh
          cat > publish-site/BUILD_INFO.txt <<INFO
          Repository: ${{ github.repository }}
          Commit: ${{ github.sha }}
          Workflow Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          INFO

      - name: Publish neuralv-site-builds branch
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          rm -rf /tmp/neuralv-site-builds
          mkdir -p /tmp/neuralv-site-builds
          cp -R publish-site/. /tmp/neuralv-site-builds/
          cd /tmp/neuralv-site-builds
          git init
          git checkout -b neuralv-site-builds
          git add .
          git -c user.name="github-actions[bot]" -c user.email="41898282+github-actions[bot]@users.noreply.github.com" commit -m "Publish NeuralV site bundle for ${GITHUB_SHA} [skip ci]"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin neuralv-site-builds

  publish-release-builds:
    name: Publish Release Builds Branch
    if: always()
    needs:
      - backend-check
      - android-release
      - desktop-linux
      - desktop-windows
      - shell-linux
      - web-neuralv
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Android bundle
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: neuralv-android-release
          path: stage/android

      - name: Download Linux desktop bundle
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: neuralv-linux-gui
          path: stage/linux

      - name: Download Windows desktop bundle
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: neuralv-windows-gui
          path: stage/windows

      - name: Download shell bundle
        uses: actions/download-artifact@v4
        with:
          name: neuralv-shell-linux
          path: stage/shell

      - name: Download site bundle
        uses: actions/download-artifact@v4
        with:
          name: neuralv-site
          path: stage/site

      - name: Build release manifest
        shell: bash
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
        run: |
          set -euo pipefail
          mkdir -p publish/android publish/windows publish/linux publish/desktop/windows publish/desktop/linux publish/shell publish/site publish/install
          if [ -f stage/android/neuralv-android-release.apk ]; then
            cp stage/android/neuralv-android-release.apk publish/android/
          fi
          if [ -f stage/windows/neuralv-windows.zip ]; then
            cp stage/windows/neuralv-windows.zip publish/windows/
            cp stage/windows/neuralv-windows.zip publish/desktop/windows/
          fi
          if [ -f stage/linux/neuralv-linux.tar.gz ]; then
            cp stage/linux/neuralv-linux.tar.gz publish/linux/
            cp stage/linux/neuralv-linux.tar.gz publish/desktop/linux/
          fi
          cp stage/shell/nv-linux.tar.gz publish/shell/
          cp stage/shell/neuralv-shell-linux.tar.gz publish/shell/
          cp stage/shell/neuralvd-linux.tar.gz publish/shell/
          cp stage/site/neuralv-site.zip publish/site/
          unzip -q publish/site/neuralv-site.zip -d publish/site
          cp shell/install/linux.sh publish/install/linux.sh
          cp shell/install/nv.sh publish/install/nv.sh

          sha_android=""
          if [ -f publish/android/neuralv-android-release.apk ]; then
            sha_android="$(sha256sum publish/android/neuralv-android-release.apk | awk '{print $1}')"
          fi
          sha_windows=""
          if [ -f publish/windows/neuralv-windows.zip ]; then
            sha_windows="$(sha256sum publish/windows/neuralv-windows.zip | awk '{print $1}')"
          fi
          sha_linux=""
          if [ -f publish/linux/neuralv-linux.tar.gz ]; then
            sha_linux="$(sha256sum publish/linux/neuralv-linux.tar.gz | awk '{print $1}')"
          fi
          sha_nv="$(sha256sum publish/shell/nv-linux.tar.gz | awk '{print $1}')"
          sha_shell="$(sha256sum publish/shell/neuralv-shell-linux.tar.gz | awk '{print $1}')"
          sha_daemon="$(sha256sum publish/shell/neuralvd-linux.tar.gz | awk '{print $1}')"
          sha_site="$(sha256sum publish/site/neuralv-site.zip | awk '{print $1}')"
          raw_base="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/release-builds"
          export SHA_ANDROID="${sha_android}"
          export SHA_WINDOWS="${sha_windows}"
          export SHA_LINUX="${sha_linux}"
          export SHA_NV="${sha_nv}"
          export SHA_SHELL="${sha_shell}"
          export SHA_DAEMON="${sha_daemon}"
          export SHA_SITE="${sha_site}"
          export RAW_BASE="${raw_base}"
          python3 - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          generated_at = datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
          artifacts = []
          sha_android = os.environ.get("SHA_ANDROID", "").strip()
          raw_base = os.environ["RAW_BASE"]
          if sha_android:
              artifacts.append({
                  "platform": "android",
                  "channel": "release",
                  "version": os.environ["GITHUB_SHA"],
                  "sha256": sha_android,
                  "download_url": f"{raw_base}/android/neuralv-android-release.apk",
                  "install_command": "",
                  "file_name": "neuralv-android-release.apk",
                  "notes": ["Android APK"],
                  "metadata": {}
              })
          sha_windows = os.environ.get("SHA_WINDOWS", "").strip()
          if sha_windows:
              artifacts.append({
                  "platform": "windows",
                  "channel": "beta",
                  "version": os.environ["GITHUB_SHA"],
                  "sha256": sha_windows,
                  "download_url": f"{raw_base}/windows/neuralv-windows.zip",
                  "install_command": "",
                  "file_name": "neuralv-windows.zip",
                  "notes": ["Compose Desktop Windows GUI"],
                  "metadata": {}
              })
          sha_linux = os.environ.get("SHA_LINUX", "").strip()
          if sha_linux:
              artifacts.append({
                  "platform": "linux",
                  "channel": "beta",
                  "version": os.environ["GITHUB_SHA"],
                  "sha256": sha_linux,
                  "download_url": f"{raw_base}/linux/neuralv-linux.tar.gz",
                  "install_command": "",
                  "file_name": "neuralv-linux.tar.gz",
                  "notes": ["Compose Desktop Linux GUI"],
                  "metadata": {
                      "daemonUrl": f"{raw_base}/shell/neuralvd-linux.tar.gz",
                      "daemonSha256": os.environ["SHA_DAEMON"]
                  }
              })
          artifacts.extend([
              {
                  "platform": "nv",
                  "channel": "beta",
                  "version": os.environ["GITHUB_SHA"],
                  "sha256": os.environ["SHA_NV"],
                  "download_url": f"{raw_base}/shell/nv-linux.tar.gz",
                  "install_command": "curl -fsSL https://sosiskibot.ru/neuralv/install/nv.sh | sh",
                  "file_name": "nv-linux.tar.gz",
                  "notes": ["Linux package manager for NeuralV releases"],
                  "metadata": {}
              },
              {
                  "platform": "shell",
                  "channel": "beta",
                  "version": os.environ["GITHUB_SHA"],
                  "sha256": os.environ["SHA_SHELL"],
                  "download_url": f"{raw_base}/shell/neuralv-shell-linux.tar.gz",
                  "install_command": "curl -fsSL https://sosiskibot.ru/neuralv/install/nv.sh | sh && nv install neuralv@latest",
                  "file_name": "neuralv-shell-linux.tar.gz",
                  "notes": ["Bubble Tea shell client"],
                  "metadata": {
                      "daemonUrl": f"{raw_base}/shell/neuralvd-linux.tar.gz",
                      "daemonSha256": os.environ["SHA_DAEMON"]
                  }
              },
              {
                  "platform": "site",
                  "channel": "main",
                  "version": os.environ["GITHUB_SHA"],
                  "sha256": os.environ["SHA_SITE"],
                  "download_url": f"{raw_base}/site/neuralv-site.zip",
                  "install_command": "",
                  "file_name": "neuralv-site.zip",
                  "notes": ["Static web bundle for /neuralv/"],
                  "metadata": {}
              }
          ])
          with open("publish/manifest.json", "w", encoding="utf-8") as f:
              json.dump({
                  "success": True,
                  "generated_at": generated_at,
                  "release_channel": "main",
                  "artifacts": artifacts
              }, f, ensure_ascii=False, indent=2)
          with open("publish/BUILD_INFO.txt", "w", encoding="utf-8") as f:
              f.write(
                  f"Repository: {os.environ['GITHUB_REPOSITORY']}\n"
                  f"Commit: {os.environ['GITHUB_SHA']}\n"
                  f"Workflow Run: {os.environ['GITHUB_SERVER_URL']}/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}\n"
                  f"Built At: {generated_at}\n"
              )
          PY

      - name: Publish release-builds branch
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          rm -rf /tmp/release-builds
          mkdir -p /tmp/release-builds
          cp -R publish/. /tmp/release-builds/
          cd /tmp/release-builds
          git init
          git checkout -b release-builds
          git add .
          git -c user.name="github-actions[bot]" -c user.email="41898282+github-actions[bot]@users.noreply.github.com" commit -m "Publish NeuralV release bundle for ${GITHUB_SHA} [skip ci]"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin release-builds
